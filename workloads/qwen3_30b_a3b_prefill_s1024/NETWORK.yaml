network:
  model_name: qwen3_30b_a3b
  phase: prefill (seq_len=1024)
  batch_size: 1
  attention: 'Q@K^T: (1024 x 1024)'
architecture:
  hidden_size: 2048
  num_attention_heads: 32
  num_key_value_heads: 4
  head_dim: 128
  gqa_ratio: 32Q / 4KV = 8:1
  intermediate_size: 6144
  vocab_size: 151936
  num_hidden_layers: 48
  moe:
    num_experts: 128
    num_experts_per_tok: 8
    moe_intermediate_size: 768
    tokens_per_expert: '64 (uniform routing: B*S*8/128)'
    total_params: 128 experts (only 8 active per token)
structure:
  description: Only unique operator YAMLs are stored. v_proj has the same dimensions
    as k_proj. expert_up_proj has the same dimensions as expert_gate_proj. All 128
    experts have identical dimensions. All 48 decoder layers are identical.
  unique_yamls:
  - layer0_q_proj
  - layer0_k_proj
  - layer0_attn_qk
  - layer0_softmax_max
  - layer0_softmax_sub_exp
  - layer0_softmax_sum
  - layer0_softmax_div
  - layer0_attn_v
  - layer0_o_proj
  - router
  - expert_gate_proj
  - expert_down_proj
  - lm_head
  total_operators_in_model: 18961
  operators_per_layer: 395
  num_layers: 48
  layer_operator_sequence:
  - yaml: q_proj.yaml
    count: 1
    description: 'Query projection: (B*S, 2048) @ (2048, 4096)'
  - yaml: k_proj.yaml
    count: 1
    description: 'Key projection: (B*S, 2048) @ (2048, 512)'
  - yaml: k_proj.yaml
    count: 1
    alias: v_proj
    description: 'Value projection: same dimensions as k_proj (GQA)'
  - yaml: attn_qk.yaml
    count: 1
    description: 'Attention scores: Q @ K^T, batched over 32 heads'
  - yaml: softmax_max.yaml
    count: 1
    description: 'Softmax step 1: row-wise max over K'
  - yaml: softmax_sub_exp.yaml
    count: 1
    description: 'Softmax step 2: subtract max and exponentiate'
  - yaml: softmax_sum.yaml
    count: 1
    description: 'Softmax step 3: row-wise sum of exp values'
  - yaml: softmax_div.yaml
    count: 1
    description: 'Softmax step 4: divide by sum'
  - yaml: attn_v.yaml
    count: 1
    description: 'Attention context: A @ V'
  - yaml: o_proj.yaml
    count: 1
    description: 'Output projection: (4096) -> (2048)'
  - yaml: router.yaml
    count: 1
    description: 'MoE router: scores each token against 128 experts, selects top-8'
  - yaml: expert_gate_proj.yaml
    count: 128
    alias: expert[0..127]_gate_proj
    description: 'Expert gate projection: 128 identical experts, each processes 64
      tokens'
  - yaml: expert_gate_proj.yaml
    count: 128
    alias: expert[0..127]_up_proj
    description: 'Expert up projection: same dimensions as expert_gate_proj (SwiGLU)'
  - yaml: expert_down_proj.yaml
    count: 128
    alias: expert[0..127]_down_proj
    description: 'Expert down projection: (768) -> (2048), 128 experts'
  global_operators:
  - yaml: lm_head.yaml
    count: 1
    description: 'Language model head: (2048) -> (151936)'
