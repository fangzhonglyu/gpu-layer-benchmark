network:
  model_name: llama3.1_70b
  phase: prefill (seq_len=512)
  batch_size: 1
  attention: 'Q@K^T: (512 x 512)'
architecture:
  hidden_size: 8192
  num_attention_heads: 64
  num_key_value_heads: 8
  head_dim: 128
  gqa_ratio: 64Q / 8KV = 8:1
  intermediate_size: 28672
  vocab_size: 128256
  num_hidden_layers: 80
structure:
  description: Only unique operator YAMLs are stored. v_proj has the same dimensions
    as k_proj. up_proj has the same dimensions as gate_proj. All 80 decoder layers
    are identical.
  unique_yamls:
  - layer0_q_proj
  - layer0_k_proj
  - layer0_attn_qk
  - layer0_softmax_max
  - layer0_softmax_sub_exp
  - layer0_softmax_sum
  - layer0_softmax_div
  - layer0_attn_v
  - layer0_o_proj
  - layer0_gate_proj
  - layer0_down_proj
  - lm_head
  total_operators_in_model: 1041
  operators_per_layer: 13
  num_layers: 80
  layer_operator_sequence:
  - yaml: layer0_q_proj.yaml
    count: 1
    description: 'Query projection: (B*S, 8192) @ (8192, 8192)'
  - yaml: layer0_k_proj.yaml
    count: 1
    description: 'Key projection: (B*S, 8192) @ (8192, 1024)'
  - yaml: layer0_k_proj.yaml
    count: 1
    alias: v_proj
    description: 'Value projection: same dimensions as k_proj (GQA)'
  - yaml: layer0_attn_qk.yaml
    count: 1
    description: 'Attention scores: Q @ K^T, batched over 64 heads'
  - yaml: layer0_softmax_max.yaml
    count: 1
    description: 'Softmax step 1: row-wise max over K'
  - yaml: layer0_softmax_sub_exp.yaml
    count: 1
    description: 'Softmax step 2: subtract max and exponentiate'
  - yaml: layer0_softmax_sum.yaml
    count: 1
    description: 'Softmax step 3: row-wise sum of exp values'
  - yaml: layer0_softmax_div.yaml
    count: 1
    description: 'Softmax step 4: divide by sum'
  - yaml: layer0_attn_v.yaml
    count: 1
    description: 'Attention context: A @ V'
  - yaml: layer0_o_proj.yaml
    count: 1
    description: 'Output projection: (8192) -> (8192)'
  - yaml: layer0_gate_proj.yaml
    count: 1
    description: 'MLP gate projection: (8192) -> (28672) with SiLU activation'
  - yaml: layer0_gate_proj.yaml
    count: 1
    alias: up_proj
    description: 'MLP up projection: same dimensions as gate_proj (SwiGLU)'
  - yaml: layer0_down_proj.yaml
    count: 1
    description: 'MLP down projection: (28672) -> (8192)'
  global_operators:
  - yaml: lm_head.yaml
    count: 1
    description: 'Language model head: (8192) -> (128256)'
